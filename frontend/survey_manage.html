<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus – Survey Builder</title>
    <meta name="description" content="Create professional class surveys with a dynamic Google-Forms-like builder in EduNexus.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ═══════════ SURVEY BUILDER STYLES ═══════════ */

        /* Override main-content for full-width builder */
        .builder-main { padding: 0 !important; display: flex; flex-direction: column; height: 100vh; }
        .builder-topbar {
            padding: 1.25rem 2rem; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(15,23,42,.6); backdrop-filter: blur(12px); z-index: 5; flex-shrink: 0;
        }
        .builder-topbar h1 { font-size: 1.4rem; margin: 0; }
        .topbar-actions { display: flex; gap: .75rem; align-items: center; }

        /* ── Tab system ── */
        .view-tabs { display: flex; gap: .5rem; margin: 0; }
        .view-tab {
            padding: .5rem 1.2rem; border-radius: 2rem; border: 1px solid var(--border-color);
            background: transparent; color: var(--text-muted); cursor: pointer;
            font-family: inherit; font-size: .85rem; transition: all .2s; font-weight: 500;
        }
        .view-tab.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .view-tab:hover:not(.active) { border-color: rgba(99,102,241,.4); color: var(--text-main); }

        /* ── View panels ── */
        .view-panel { display: none; flex: 1; overflow: hidden; }
        .view-panel.active { display: flex; }

        /* ═══ BUILDER VIEW (split screen) ═══ */
        .builder-split {
            display: flex; flex: 1; overflow: hidden;
        }
        .builder-left {
            flex: 1; min-width: 0; overflow-y: auto; padding: 2rem;
            border-right: 1px solid var(--border-color);
            scrollbar-width: thin; scrollbar-color: rgba(99,102,241,.3) transparent;
        }
        .builder-right {
            width: 420px; flex-shrink: 0; overflow-y: auto; padding: 2rem;
            background: rgba(8,12,22,.5);
            scrollbar-width: thin; scrollbar-color: rgba(99,102,241,.2) transparent;
        }
        @media (max-width: 1100px) {
            .builder-right { display: none; }
        }

        /* ── Survey metadata card ── */
        .meta-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem;
            border-top: 4px solid var(--primary-color);
        }
        .meta-card h2 { font-size: 1.1rem; margin: 0 0 1.25rem; border: none; padding: 0; }

        /* ── Question card ── */
        .q-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 1rem; padding: 1.25rem 1.5rem; margin-bottom: 1rem;
            transition: border-color .2s, box-shadow .2s, transform .15s;
            position: relative; cursor: default;
            animation: slideIn .3s cubic-bezier(.16,1,.3,1);
        }
        .q-card:hover { border-color: rgba(99,102,241,.3); }
        .q-card.active {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 1px var(--primary-color), 0 8px 24px rgba(99,102,241,.12);
        }
        .q-card.removing {
            animation: slideOut .25s ease forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px) scale(.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideOut {
            to { opacity: 0; transform: translateY(-8px) scale(.97); height: 0; margin: 0; padding: 0; overflow: hidden; }
        }

        .q-header {
            display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem;
        }
        .q-number {
            background: linear-gradient(135deg, var(--primary-color), #818cf8);
            color: white; font-weight: 700; font-size: .8rem;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .q-type-select {
            padding: .4rem .8rem; border-radius: .5rem; font-size: .82rem;
            background: rgba(15,23,42,.6); border: 1px solid var(--border-color);
            color: var(--text-main); cursor: pointer; font-family: inherit;
        }
        .q-type-select option { background: var(--bg-dark); }
        .q-actions {
            margin-left: auto; display: flex; gap: .4rem;
        }
        .q-action-btn {
            background: transparent; border: 1px solid transparent;
            color: var(--text-muted); cursor: pointer; padding: .35rem .5rem;
            border-radius: .4rem; font-size: .85rem; transition: all .15s;
        }
        .q-action-btn:hover { color: var(--text-main); background: rgba(255,255,255,.05); }
        .q-action-btn.delete:hover { color: #f87171; background: rgba(239,68,68,.1); }

        .q-text-input {
            width: 100%; padding: .75rem 1rem; border-radius: .6rem;
            background: rgba(15,23,42,.5); border: 1px solid var(--border-color);
            color: var(--text-main); font-size: .95rem; font-family: inherit;
            resize: vertical; transition: border-color .2s;
        }
        .q-text-input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(99,102,241,.15); }
        .q-text-input.error { border-color: var(--error); }

        /* ── Options ── */
        .options-section { margin-top: 1rem; padding-left: .25rem; }
        .options-section .section-label { font-size: .78rem; color: var(--text-muted); margin-bottom: .5rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
        .opt-row {
            display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem;
            animation: fadeIn .2s ease;
        }
        .opt-radio {
            width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border-color);
            flex-shrink: 0; background: transparent;
        }
        .opt-input {
            flex: 1; padding: .55rem .75rem; border-radius: .5rem; font-size: .88rem;
            background: rgba(15,23,42,.4); border: 1px solid var(--border-color);
            color: var(--text-main); font-family: inherit; transition: border-color .2s;
        }
        .opt-input:focus { outline: none; border-color: var(--primary-color); }
        .opt-input.error { border-color: var(--error); }
        .opt-delete {
            background: transparent; border: none; color: var(--text-muted);
            cursor: pointer; padding: .25rem; font-size: .85rem; transition: color .15s;
        }
        .opt-delete:hover { color: #f87171; }
        .add-opt-btn {
            display: inline-flex; align-items: center; gap: .4rem;
            background: transparent; border: 1px dashed var(--border-color);
            color: var(--text-muted); padding: .45rem .9rem; border-radius: .5rem;
            cursor: pointer; font-size: .82rem; font-family: inherit;
            transition: all .15s; margin-top: .5rem;
        }
        .add-opt-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }

        .text-hint {
            margin-top: .75rem; padding: .65rem 1rem; border-radius: .5rem;
            background: rgba(99,102,241,.06); border: 1px solid rgba(99,102,241,.12);
            font-size: .8rem; color: var(--text-muted);
        }

        /* ── Error text ── */
        .q-error {
            font-size: .78rem; color: var(--error); margin-top: .35rem;
            display: none; animation: fadeIn .2s ease;
        }
        .q-error.visible { display: block; }

        /* ── Add question bar ── */
        .add-q-bar {
            display: flex; gap: .75rem; padding: 1.25rem; border-radius: 1rem;
            border: 2px dashed var(--border-color); justify-content: center;
            transition: border-color .2s; margin-top: .5rem;
        }
        .add-q-bar:hover { border-color: rgba(99,102,241,.3); }
        .add-q-type-btn {
            display: inline-flex; align-items: center; gap: .5rem;
            padding: .6rem 1.25rem; border-radius: 2rem; font-size: .88rem;
            font-family: inherit; cursor: pointer; font-weight: 600; transition: all .2s;
            border: 1px solid var(--border-color); background: transparent; color: var(--text-main);
        }
        .add-q-type-btn:hover { transform: translateY(-1px); }
        .add-q-type-btn.mcq  { border-color: rgba(99,102,241,.3); }
        .add-q-type-btn.mcq:hover  { background: rgba(99,102,241,.12); border-color: var(--primary-color); color: #c7d2fe; }
        .add-q-type-btn.text { border-color: rgba(16,185,129,.3); }
        .add-q-type-btn.text:hover { background: rgba(16,185,129,.1); border-color: var(--success); color: #6ee7b7; }

        /* ═══ PREVIEW PANEL ═══ */
        .preview-header {
            display: flex; align-items: center; gap: .5rem;
            margin-bottom: 1.5rem; color: var(--text-muted); font-size: .82rem;
            text-transform: uppercase; letter-spacing: .5px; font-weight: 600;
        }
        .preview-header i { color: var(--primary-color); }
        .preview-title {
            font-size: 1.3rem; font-weight: 700; margin-bottom: .25rem;
            color: var(--text-main); min-height: 1.3em;
        }
        .preview-desc {
            font-size: .88rem; color: var(--text-muted); margin-bottom: 1.5rem;
            min-height: 1em;
        }
        .preview-q {
            background: rgba(30,41,59,.6); border: 1px solid var(--border-color);
            border-radius: .75rem; padding: 1rem 1.25rem; margin-bottom: .75rem;
            transition: all .2s;
        }
        .preview-q.highlight { border-color: var(--primary-color); background: rgba(99,102,241,.04); }
        .preview-q-text { font-weight: 500; margin-bottom: .75rem; font-size: .9rem; line-height: 1.5; }
        .preview-q-num  { color: var(--primary-color); font-weight: 700; }
        .preview-opt {
            display: flex; align-items: center; gap: .6rem; padding: .4rem .5rem;
            font-size: .85rem; color: var(--text-muted);
        }
        .preview-radio {
            width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border-color);
            flex-shrink: 0;
        }
        .preview-text-area {
            width: 100%; padding: .55rem .75rem; border-radius: .5rem; font-size: .82rem;
            background: rgba(15,23,42,.4); border: 1px solid var(--border-color);
            color: var(--text-muted); font-family: inherit; resize: none; height: 2.5rem;
        }
        .preview-empty {
            text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: .9rem;
        }
        .preview-empty i { font-size: 2.5rem; display: block; margin-bottom: 1rem; opacity: .3; }

        /* ═══ SURVEY LIST VIEW ═══ */
        .survey-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 1rem; padding: 1.25rem 1.5rem; margin-bottom: .75rem;
            display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
            flex-wrap: wrap; transition: border-color .2s;
        }
        .survey-card:hover { border-color: rgba(99,102,241,.3); }
        .survey-card h4 { margin: 0 0 .3rem; font-size: 1rem; }
        .survey-card .meta { font-size: .78rem; color: var(--text-muted); margin: .1rem 0; }
        .badge { display:inline-block; padding:.2rem .55rem; border-radius:1rem; font-size:.72rem; font-weight:600; }
        .badge-blue  { background:rgba(99,102,241,.15); color:#818cf8; }
        .badge-green { background:rgba(16,185,129,.12); color:var(--success); }
        .inline-actions { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; }
        .danger-btn {
            background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25);
            color:#f87171; border-radius:.5rem; padding:.35rem .7rem;
            cursor:pointer; font-size:.8rem; transition:all .15s;
        }
        .danger-btn:hover { background:rgba(239,68,68,.2); }

        /* ═══ RESULTS VIEW ═══ */
        .results-question { border:1px solid var(--border-color); border-radius:.75rem; padding:1.25rem; margin-bottom:1rem; }
        .results-question h4 { margin:0 0 1rem; font-size:.95rem; }
        .answer-bar-wrap  { margin-bottom:.75rem; }
        .answer-bar-label { display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:.25rem; }
        .answer-bar-bg    { background:var(--border-color); border-radius:1rem; height:8px; overflow:hidden; }
        .answer-bar-fill  { height:100%; border-radius:1rem; transition:width .5s ease; }
        .text-chip {
            display:inline-block; background:rgba(99,102,241,.08); border:1px solid rgba(99,102,241,.15);
            border-radius:.5rem; padding:.35rem .75rem; margin:.2rem; font-size:.82rem;
        }

        /* ═══ TOAST ═══ */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; padding: 1rem 1.5rem; border-radius: .75rem;
            font-weight: 600; font-size: .95rem; box-shadow: 0 12px 32px rgba(16,185,129,.3);
            transform: translateY(120%); opacity: 0; transition: all .35s cubic-bezier(.16,1,.3,1);
            display: flex; align-items: center; gap: .6rem;
        }
        .toast.visible { transform: translateY(0); opacity: 1; }

        /* ── Scrollbar ── */
        .builder-left::-webkit-scrollbar, .builder-right::-webkit-scrollbar { width: 5px; }
        .builder-left::-webkit-scrollbar-thumb { background: rgba(99,102,241,.3); border-radius: 3px; }
        .builder-right::-webkit-scrollbar-thumb { background: rgba(99,102,241,.2); border-radius: 3px; }

        body { display: flex; justify-content: initial; align-items: initial; }
    </style>
</head>
<body>
<div class="dashboard-layout">
    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-header"><h2>EduNexus</h2></div>
        <ul class="nav-links">
            <li><a href="faculty_dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li class="active"><a href="#"><i class="fas fa-poll"></i> Surveys</a></li>
        </ul>
        <div class="sidebar-footer">
            <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main-content builder-main">
        <!-- Top bar -->
        <div class="builder-topbar">
            <h1><i class="fas fa-poll" style="color:var(--primary-color);margin-right:.6rem;font-size:1.2rem;"></i>Survey Manager</h1>
            <div class="topbar-actions">
                <div class="view-tabs">
                    <button class="view-tab active" onclick="switchView('list',this)" id="vtab-list">
                        <i class="fas fa-list"></i> My Surveys
                    </button>
                    <button class="view-tab" onclick="switchView('builder',this)" id="vtab-builder">
                        <i class="fas fa-hammer"></i> Builder
                    </button>
                    <button class="view-tab" onclick="switchView('results',this)" id="vtab-results" style="display:none;">
                        <i class="fas fa-chart-bar"></i> Results
                    </button>
                </div>
            </div>
        </div>

        <!-- ═══════ VIEW: Survey List ═══════ -->
        <div id="view-list" class="view-panel active" style="flex-direction:column;padding:2rem;overflow-y:auto;">
            <div id="surveys-list"><p style="color:var(--text-muted)">Loading surveys…</p></div>
        </div>

        <!-- ═══════ VIEW: Builder (split screen) ═══════ -->
        <div id="view-builder" class="view-panel">
            <div class="builder-split">
                <!-- LEFT: Builder form -->
                <div class="builder-left">
                    <!-- Survey meta -->
                    <div class="meta-card">
                        <h2><i class="fas fa-file-alt" style="color:var(--primary-color);margin-right:.5rem;"></i>Survey Details</h2>
                        <div class="form-group" style="margin-bottom:1rem;">
                            <label style="font-size:.82rem;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;display:block;">
                                Title <span style="color:var(--error)">*</span></label>
                            <input type="text" id="s-title" class="q-text-input" placeholder="e.g. Mid-semester Feedback" oninput="updatePreview()">
                        </div>
                        <div class="form-group" style="margin-bottom:1rem;">
                            <label style="font-size:.82rem;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;display:block;">
                                Description <span style="font-weight:400;font-size:.75rem;">(optional)</span></label>
                            <textarea id="s-desc" class="q-text-input" rows="2" placeholder="Brief instructions for students…" oninput="updatePreview()"></textarea>
                        </div>
                        <div class="form-group">
                            <label style="font-size:.82rem;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;display:block;">
                                Assign to Class <span style="color:var(--error)">*</span></label>
                            <select id="s-class" class="q-text-input" style="cursor:pointer;"></select>
                        </div>
                    </div>

                    <!-- Questions label -->
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                        <div style="font-size:.82rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;">
                            <i class="fas fa-layer-group" style="margin-right:.4rem;color:var(--primary-color);"></i>
                            Questions (<span id="q-count">0</span>)
                        </div>
                    </div>

                    <!-- Question cards container -->
                    <div id="q-container"></div>

                    <!-- Add question bar -->
                    <div class="add-q-bar" id="add-q-bar">
                        <button class="add-q-type-btn mcq" onclick="addQuestion('mcq')">
                            <i class="fas fa-list-ul"></i> MCQ
                        </button>
                        <button class="add-q-type-btn text" onclick="addQuestion('text')">
                            <i class="fas fa-font"></i> Text
                        </button>
                    </div>

                    <!-- Submit -->
                    <div style="margin-top:1.5rem;">
                        <div id="builder-error" class="q-error" style="margin-bottom:.75rem;text-align:center;font-size:.85rem;"></div>
                        <button class="btn" id="submit-btn" onclick="submitSurvey()" style="width:100%;font-size:1rem;padding:1rem;">
                            <i class="fas fa-paper-plane"></i> Create Survey
                        </button>
                    </div>
                </div>

                <!-- RIGHT: Live Preview -->
                <div class="builder-right">
                    <div class="preview-header"><i class="fas fa-eye"></i> LIVE PREVIEW — Student View</div>
                    <div id="preview-area">
                        <div class="preview-empty">
                            <i class="fas fa-eye-slash"></i>
                            Start building your survey to see a live preview here.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════ VIEW: Results ═══════ -->
        <div id="view-results" class="view-panel" style="flex-direction:column;padding:2rem;overflow-y:auto;">
            <div id="results-header" class="meta-card" style="margin-bottom:1.5rem;">
                <h2 id="results-title" style="border:none;padding:0;">Survey Results</h2>
                <p id="results-meta" style="color:var(--text-muted);margin:0;"></p>
            </div>
            <div id="results-body"></div>
        </div>
    </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg"></span></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════════
   EDUNEXUS SURVEY BUILDER — Premium Google-Forms-Style UI
   ═══════════════════════════════════════════════════════════════════════════════ */

const API   = 'http://localhost:5000/api/faculty';
const token = localStorage.getItem('token');
const role  = localStorage.getItem('role');
if (!token || role !== 'faculty') window.location.href = 'login.html';
function auth() { return { 'Content-Type':'application/json', Authorization:`Bearer ${token}` }; }
function logout() { localStorage.clear(); window.location.href = 'login.html'; }

// ── State ─────────────────────────────────────────────────────────────────────
let questions     = [];       // [ { id, type, text, options:[] } ]
let nextId        = 1;
let activeQId     = null;     // which question card is "focused"

// ── View switching ────────────────────────────────────────────────────────────
function switchView(name, btn) {
    document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (btn) btn.classList.add('active');
    if (name === 'list') loadSurveys();
}

// ═══════════════════════════════════════════════════════════════════════════════
// SURVEY LIST
// ═══════════════════════════════════════════════════════════════════════════════

async function loadSurveys() {
    const el = document.getElementById('surveys-list');
    el.innerHTML = '<p style="color:var(--text-muted)">Loading…</p>';
    try {
        const r = await fetch(`${API}/surveys`, { headers: auth() });
        const d = await r.json();
        if (!r.ok || !d.length) {
            el.innerHTML = `<div style="text-align:center;padding:4rem 1rem;">
                <i class="fas fa-inbox" style="font-size:3rem;color:var(--text-muted);opacity:.3;display:block;margin-bottom:1.25rem;"></i>
                <p style="color:var(--text-muted);font-size:1.05rem;margin-bottom:1rem;">No surveys yet</p>
                <button class="btn" style="width:auto;padding:.6rem 1.5rem;font-size:.9rem;" onclick="switchView('builder',document.getElementById('vtab-builder'))">
                    <i class="fas fa-plus"></i> Create your first survey
                </button>
            </div>`;
            return;
        }
        el.innerHTML = d.map(s => `
            <div class="survey-card">
                <div style="flex:1;min-width:180px;">
                    <h4>${esc(s.title)}</h4>
                    ${s.description ? `<p class="meta">${esc(s.description)}</p>` : ''}
                    <p class="meta"><i class="fas fa-chalkboard" style="width:15px;"></i> ${esc(s.class_name)}</p>
                    <p class="meta"><i class="fas fa-clock" style="width:15px;"></i> ${s.created_at}</p>
                    <div style="margin-top:.5rem;display:flex;gap:.35rem;flex-wrap:wrap;">
                        <span class="badge badge-blue"><i class="fas fa-question-circle"></i> ${s.question_count} Qs</span>
                        <span class="badge badge-green"><i class="fas fa-users"></i> ${s.response_count}</span>
                    </div>
                </div>
                <div class="inline-actions">
                    <button class="btn" style="padding:.35rem .9rem;height:auto;font-size:.82rem;background:var(--success);"
                        onclick="openResults(${s.id},'${escJs(s.title)}',${s.response_count})">
                        <i class="fas fa-chart-bar"></i> Results
                    </button>
                    <button class="danger-btn" onclick="deleteSurvey(${s.id})"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    } catch(e) { el.innerHTML = `<p style="color:var(--error)">Failed to load.</p>`; }
}

async function deleteSurvey(id) {
    if (!confirm('Delete this survey and all responses?')) return;
    await fetch(`${API}/survey/${id}`, { method:'DELETE', headers:auth() });
    loadSurveys();
}

// ═══════════════════════════════════════════════════════════════════════════════
// BUILDER — Dynamic Question Management
// ═══════════════════════════════════════════════════════════════════════════════

function addQuestion(type) {
    const q = { id: nextId++, type, text: '', options: type === 'mcq' ? ['',''] : [] };
    questions.push(q);
    activeQId = q.id;
    renderBuilder();
    // Scroll to new card
    setTimeout(() => {
        const card = document.getElementById('qcard-' + q.id);
        if (card) card.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 50);
}

function removeQuestion(qid) {
    const card = document.getElementById('qcard-' + qid);
    if (card) {
        card.classList.add('removing');
        setTimeout(() => {
            questions = questions.filter(q => q.id !== qid);
            if (activeQId === qid) activeQId = questions.length ? questions[questions.length-1].id : null;
            renderBuilder();
        }, 250);
    }
}

function moveQuestion(qid, dir) {
    const idx = questions.findIndex(q => q.id === qid);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= questions.length) return;
    [questions[idx], questions[newIdx]] = [questions[newIdx], questions[idx]];
    renderBuilder();
}

function changeType(qid, newType) {
    const q = questions.find(x => x.id === qid);
    if (!q) return;
    q.type = newType;
    if (newType === 'mcq' && q.options.length < 2) q.options = ['',''];
    if (newType === 'text') q.options = [];
    renderBuilder();
}

function updateQText(qid, val) {
    const q = questions.find(x => x.id === qid);
    if (q) q.text = val;
    updatePreview();
}

function addOption(qid) {
    const q = questions.find(x => x.id === qid);
    if (q) { q.options.push(''); renderBuilder(); }
}

function removeOption(qid, idx) {
    const q = questions.find(x => x.id === qid);
    if (q && q.options.length > 2) { q.options.splice(idx, 1); renderBuilder(); }
}

function updateOption(qid, idx, val) {
    const q = questions.find(x => x.id === qid);
    if (q) q.options[idx] = val;
    updatePreview();
}

function setActive(qid) {
    activeQId = qid;
    document.querySelectorAll('.q-card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById('qcard-' + qid);
    if (card) card.classList.add('active');
    updatePreview();
}

// ── Render Builder ────────────────────────────────────────────────────────────
function renderBuilder() {
    const container = document.getElementById('q-container');
    document.getElementById('q-count').textContent = questions.length;

    if (!questions.length) {
        container.innerHTML = '';
        updatePreview();
        return;
    }

    container.innerHTML = questions.map((q, i) => {
        const isActive = q.id === activeQId;
        let optionsHtml = '';

        if (q.type === 'mcq') {
            const opts = q.options.map((o, oi) => `
                <div class="opt-row">
                    <div class="opt-radio"></div>
                    <input class="opt-input" type="text" placeholder="Option ${oi+1}" value="${esc(o)}"
                        oninput="updateOption(${q.id},${oi},this.value)" onfocus="setActive(${q.id})">
                    ${q.options.length > 2
                        ? `<button class="opt-delete" onclick="removeOption(${q.id},${oi})" title="Remove"><i class="fas fa-times"></i></button>`
                        : `<span style="width:24px;"></span>`}
                </div>
            `).join('');

            optionsHtml = `
                <div class="options-section">
                    <div class="section-label">Options</div>
                    ${opts}
                    <button class="add-opt-btn" onclick="addOption(${q.id})">
                        <i class="fas fa-plus"></i> Add Option
                    </button>
                </div>`;
        } else {
            optionsHtml = `<div class="text-hint"><i class="fas fa-info-circle" style="margin-right:.4rem;"></i>Students will provide a free-text response.</div>`;
        }

        return `
            <div class="q-card ${isActive ? 'active' : ''}" id="qcard-${q.id}" onclick="setActive(${q.id})">
                <div class="q-header">
                    <div class="q-number">${i+1}</div>
                    <select class="q-type-select" onchange="changeType(${q.id},this.value)" onfocus="setActive(${q.id})">
                        <option value="mcq" ${q.type==='mcq'?'selected':''}>Multiple Choice</option>
                        <option value="text" ${q.type==='text'?'selected':''}>Text Answer</option>
                    </select>
                    <div class="q-actions">
                        <button class="q-action-btn" onclick="event.stopPropagation();moveQuestion(${q.id},-1)" title="Move up" ${i===0?'disabled style="opacity:.3"':''}>
                            <i class="fas fa-chevron-up"></i>
                        </button>
                        <button class="q-action-btn" onclick="event.stopPropagation();moveQuestion(${q.id},1)" title="Move down" ${i===questions.length-1?'disabled style="opacity:.3"':''}>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <button class="q-action-btn delete" onclick="event.stopPropagation();removeQuestion(${q.id})" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
                <input type="text" class="q-text-input" placeholder="Enter your question…" value="${esc(q.text)}"
                    oninput="updateQText(${q.id},this.value)" onfocus="setActive(${q.id})">
                <div class="q-error" id="qerr-${q.id}"></div>
                ${optionsHtml}
            </div>
        `;
    }).join('');

    updatePreview();
}

// ═══════════════════════════════════════════════════════════════════════════════
// LIVE PREVIEW
// ═══════════════════════════════════════════════════════════════════════════════

function updatePreview() {
    const area  = document.getElementById('preview-area');
    const title = document.getElementById('s-title').value.trim();
    const desc  = document.getElementById('s-desc').value.trim();

    if (!title && !questions.length) {
        area.innerHTML = `<div class="preview-empty"><i class="fas fa-eye-slash"></i>Start building your survey to see a live preview here.</div>`;
        return;
    }

    let html = `<div class="preview-title">${esc(title) || '<span style="opacity:.3">Untitled Survey</span>'}</div>`;
    if (desc) html += `<div class="preview-desc">${esc(desc)}</div>`;
    else html += `<div class="preview-desc" style="opacity:.3;">No description</div>`;

    if (!questions.length) {
        html += `<div style="text-align:center;padding:2rem 0;color:var(--text-muted);font-size:.85rem;">
                    <i class="fas fa-layer-group" style="display:block;font-size:1.5rem;margin-bottom:.5rem;opacity:.3;"></i>
                    Add questions to see them here
                 </div>`;
    } else {
        html += questions.map((q, i) => {
            const isHL = q.id === activeQId;
            let body = '';
            if (q.type === 'mcq') {
                body = q.options.map(o =>
                    `<div class="preview-opt"><div class="preview-radio"></div>${esc(o) || '<span style="opacity:.25">Option</span>'}</div>`
                ).join('');
            } else {
                body = `<textarea class="preview-text-area" disabled placeholder="Student's answer…"></textarea>`;
            }
            return `<div class="preview-q ${isHL?'highlight':''}">
                <div class="preview-q-text"><span class="preview-q-num">${i+1}.</span> ${esc(q.text) || '<span style="opacity:.25">Question text</span>'}</div>
                ${body}
            </div>`;
        }).join('');
    }

    area.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════════════════════════════════

async function submitSurvey() {
    const title    = document.getElementById('s-title').value.trim();
    const desc     = document.getElementById('s-desc').value.trim();
    const classId  = document.getElementById('s-class').value;
    const errEl    = document.getElementById('builder-error');
    errEl.classList.remove('visible');

    // Clear old per-question errors
    document.querySelectorAll('.q-error').forEach(e => { e.classList.remove('visible'); e.textContent = ''; });
    document.querySelectorAll('.q-text-input.error, .opt-input.error').forEach(e => e.classList.remove('error'));

    // Validate
    if (!title) { showError(errEl, 'Survey title is required.'); document.getElementById('s-title').classList.add('error'); document.getElementById('s-title').focus(); return; }
    if (!classId) { showError(errEl, 'Please select a class.'); return; }
    if (!questions.length) { showError(errEl, 'Add at least one question.'); return; }

    let valid = true;
    questions.forEach(q => {
        const qErrEl = document.getElementById('qerr-' + q.id);
        if (!q.text.trim()) {
            valid = false;
            if (qErrEl) { qErrEl.textContent = 'Question text cannot be empty.'; qErrEl.classList.add('visible'); }
            const card = document.getElementById('qcard-' + q.id);
            if (card) card.querySelector('.q-text-input')?.classList.add('error');
        }
        if (q.type === 'mcq') {
            const filled = q.options.filter(o => o.trim()).length;
            if (filled < 2) {
                valid = false;
                if (qErrEl) { qErrEl.textContent = 'MCQ must have at least 2 non-empty options.'; qErrEl.classList.add('visible'); }
            }
        }
    });

    if (!valid) { showError(errEl, 'Fix the errors highlighted above.'); return; }

    // Build payload
    const payload = {
        title, description: desc, class_id: parseInt(classId),
        questions: questions.map(q => ({
            question_text: q.text.trim(),
            question_type: q.type,
            options: q.type === 'mcq' ? q.options.filter(o => o.trim()) : []
        }))
    };

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating…';

    try {
        const r = await fetch(`${API}/surveys`, { method:'POST', headers:auth(), body:JSON.stringify(payload) });
        const d = await r.json();
        if (r.ok) {
            showToast(`Survey "${d.title || title}" created successfully!`);
            // Reset
            questions = []; nextId = 1; activeQId = null;
            document.getElementById('s-title').value = '';
            document.getElementById('s-desc').value  = '';
            renderBuilder();
            updatePreview();
            // Switch to list after brief delay
            setTimeout(() => switchView('list', document.getElementById('vtab-list')), 800);
        } else {
            showError(errEl, d.message || 'Failed to create survey.');
        }
    } catch(e) {
        showError(errEl, 'Server unreachable.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Create Survey';
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════════════════════════

async function openResults(sid, title, count) {
    document.getElementById('results-title').textContent = title;
    document.getElementById('results-meta').textContent  = `${count} response${count!==1?'s':''}`;
    document.getElementById('vtab-results').style.display = '';
    switchView('results', document.getElementById('vtab-results'));

    const body = document.getElementById('results-body');
    body.innerHTML = '<p style="color:var(--text-muted)">Loading…</p>';

    try {
        const r = await fetch(`${API}/survey/${sid}/results`, { headers:auth() });
        const d = await r.json();
        if (!r.ok) { body.innerHTML = `<p style="color:var(--error)">${d.message}</p>`; return; }
        const total = d.total_responses;
        const colors = ['#818cf8','#34d399','#fbbf24','#f87171','#a78bfa','#38bdf8','#fb923c','#e879f9'];

        body.innerHTML = d.questions.map((q, i) => {
            let inner = '';
            if (q.type === 'mcq') {
                inner = (q.answer_summary||[]).length
                    ? q.answer_summary.map((a, ai) => {
                        const pct = total > 0 ? Math.round(a.count/total*100) : 0;
                        return `<div class="answer-bar-wrap">
                            <div class="answer-bar-label"><span>${esc(a.answer_text||'—')}</span><span style="font-weight:600;">${a.count} (${pct}%)</span></div>
                            <div class="answer-bar-bg"><div class="answer-bar-fill" style="width:${pct}%;background:${colors[ai%colors.length]};"></div></div>
                        </div>`;
                    }).join('')
                    : '<p style="color:var(--text-muted);font-size:.85rem;">No responses yet.</p>';
            } else {
                inner = (q.raw_answers||[]).length
                    ? q.raw_answers.map(a => `<span class="text-chip"><strong>${esc(a.student_name)}:</strong> ${esc(a.answer_text)}</span>`).join('')
                    : '<p style="color:var(--text-muted);font-size:.85rem;">No responses yet.</p>';
            }
            return `<div class="results-question">
                <h4><span style="color:var(--primary-color);font-weight:700;margin-right:.4rem;">${i+1}.</span>${esc(q.question_text)}
                    <span class="badge badge-blue" style="margin-left:.5rem;">${q.type.toUpperCase()}</span></h4>
                ${inner}
            </div>`;
        }).join('');
    } catch(e) { body.innerHTML = `<p style="color:var(--error)">Failed to load.</p>`; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════

async function loadClassDropdown() {
    try {
        const r = await fetch(`${API}/my-classes`, { headers:auth() });
        const d = await r.json();
        const sel = document.getElementById('s-class');
        sel.innerHTML = '<option value="" disabled selected>Select class…</option>';
        const seen = new Set();
        d.forEach(c => {
            if (!seen.has(c.class_id)) {
                seen.add(c.class_id);
                sel.innerHTML += `<option value="${c.class_id}">${c.department} — Sem ${c.semester} (${c.section})</option>`;
            }
        });
    } catch(e) { console.error(e); }
}

function showError(el, msg) { el.textContent = msg; el.classList.add('visible'); }

function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 3500);
}

function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    loadSurveys();
    loadClassDropdown();
    updatePreview();
});
</script>
