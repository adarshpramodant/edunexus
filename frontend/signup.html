<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNexus - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-logo">EduNexus</h1>
            <p class="auth-subtitle">Create an account to get started.</p>
        </div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="john@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" class="form-control form-select" required onchange="toggleAdminFields()">
                    <option value="" disabled selected>Select your role</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            
            <div id="admin-fields">
                <div class="form-group">
                    <label for="institutionName">Institution Name</label>
                    <input type="text" id="institutionName" class="form-control" placeholder="e.g. EduNexus University">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create a strong password" required autocomplete="new-password">
            </div>
            
            <div id="signupError" class="error-message"></div>
            
            <button type="submit" class="btn" id="signupBtn">Create Account</button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
